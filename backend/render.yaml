services:
  - type: web
    name: yellownews-backend
    env: node
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: PORT
        value: "10000"
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /health
